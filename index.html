<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator – Inalegwu Emmanuel</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <!-- Theme Toggle Button -->
  <button class="btn btn-outline-secondary theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
    title="Toggle dark/light mode">
    🌙
  </button>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-6 col-sm-8">

        <!-- Header -->
        <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
          <h4 class="text-center group-header mb-0">INALEGWU EMMANUEL</h4>
          <p class="text-center text-small text-muted mb-0">
            <i>VUG/SEN/22/7171 &mdash; SEN 482 Calculator</i>
          </p>
        </div>

        <div class="row">
          <div class="col-md-12">
            <div class="card calculator-card">
              <div class="card-body p-4">
                <div class="calculator">

                  <!-- Display -->
                  <div class="display-container">
                    <input type="text" class="form-control" id="result" placeholder="0" disabled />
                  </div>

                  <!-- Roman Numeral Output -->
                  <div id="roman-display" class="word-display-area" style="display:none; margin-bottom: 12px;">
                    <span class="small-label">Roman</span>
                    <span id="roman-result" style="font-size:16px; font-weight:600; color:#0d6efd;"></span>
                  </div>

                  <!-- Button Grid -->
                  <div class="btn-grid">

                    <!-- Row 1: AC, backspace, % ,÷ -->
                    <button class="btn btn-action"  onclick="clearResult()">AC</button>
                    <button class="btn btn-light"   onclick="backspace()">←</button>
                    <button class="btn btn-operator" onclick="percentToResult()">%</button>
                    <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>

                    <!-- Row 2: 7 8 9 × -->
                    <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                    <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                    <button class="btn btn-light" onclick="appendToResult(9)">9</button>
                    <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>

                    <!-- Row 3: 4 5 6 − -->
                    <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                    <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                    <button class="btn btn-light" onclick="appendToResult(6)">6</button>
                    <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>

                    <!-- Row 4: 1 2 3 + -->
                    <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                    <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                    <button class="btn btn-light" onclick="appendToResult(3)">3</button>
                    <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>

                    <!-- Row 5: 0 . = -->
                    <button class="btn btn-light" onclick="appendToResult(0)" style="grid-column: span 2;">0</button>
                    <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                    <button class="btn btn-equals" onclick="calculateResult()">=</button>

                  </div>
                </div>
              </div>
            </div>
          </div>
        </div><!-- /row -->

      </div>
    </div>
  </div>

  <script src="assets/js/bootstrap.min.js"></script>
  <script src="assets/js/script.js"></script>
</body>

</html>
