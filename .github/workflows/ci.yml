name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test & Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test --if-present

      - name: Build
        run: |
          npm run build --if-present

      - name: Collect build artifact paths (debug)
        id: collect
        run: |
          echo "Checking for common build folders..."
          for p in public_html dist build; do
            if [ -d "$p" ]; then
              echo "found=$p" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          # If no common build dir found, upload repository root as fallback
          echo "found=." >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: |
            public_html
            dist
            build
            .
          retention-days: 7
